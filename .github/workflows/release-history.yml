name: Release history

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify version and changelog
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: node scripts/verify-release.mjs
